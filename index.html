<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Personal Project Card</title>
</head>
<body>
    <main class="container">

        <div class="profile-card">

            <div class="header">
                <img src="assets/images/edit-icon.jpg" class="edit-icon" alt="Profile edit icon">
                <img src="assets/images/header-bg.jpeg" class="header-bg" alt="Header background">
            </div>

            <div class="avatar">
                <img src="assets/images/profile.png" class="profile-pic" alt="Profile picture of Amritalakshmi">
            </div>

            <div class="user-info">
                <h1 class="name">Amritalakshmi M.</h1>
                <p class="location"><i>Kottayam, Kerala, India</i></p>
                <p class="role">Frontend Developer</p>
                <p class="bio">Passionate about building Responsive UI.<br> Build projects and learn every day.</p>
            </div>

            <nav class="social-links" aria-label="Social media links">
                <a href="https://github.com/amritalakshmim" target="_blank" rel="noopener noreferrer" class="social-link"><i class="fa-brands fa-github"></i></a>
                
                <a href="https://www.linkedin.com/in/amritalakshmim/" target="_blank" rel="noopener noreferrer"  class="social-link"><i class="fa-brands fa-linkedin"></i></a>
                <a href="https://www.instagram.com/amritalakshmim/" target="_blank" rel="noopener noreferrer"  class="social-link"><i class="fa-brands fa-instagram"></i></a>
            </nav>

        </div>

    </main>
    
</body>
</html>
