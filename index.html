<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Personal Project Card</title>
</head>
<body>
    <main class="container">
        <div class="profile-card">
            <div class="header">
                <img src="assets/images/edit-icon.jpeg" class="edit-icon" alt="Edit profile icon">
            </div>
            <div class="avatar">
                <img src="assets/images/profile.png" class="profile-pic" alt="Profile picture of Amritalakshmi">
            </div>
            <div class="user-info">
                <h1>Amritalakshmi M.</h1>
                <p class="location">Kottayam, Kerala, India</p>
                <p class="role">Web Developer</p>
                <p class="bio">Passionate about building Responsive UI. Build projects and learn every day.</p>
            </div>
            <nav class="social-links" aria-label="Social media links">
                <a href="https://github.com/amritalakshmim" target="_blank" rel="noopener noreferrer" class="social-link">GitHub</a>
                <a href="https://www.linkedin.com/in/amritalakshmim/" target="_blank" rel="noopener noreferrer"  class="social-link">LinkedIn</a>
                <a href="https://www.instagram.com/amritalakshmim/" target="_blank" rel="noopener noreferrer"  class="social-link">Instagram</a>
            </nav>
        </div>
    </main>
</body>
</html>
